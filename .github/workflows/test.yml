name: Run macOS FASMARM ARM64

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # ЭТАП 1: Компиляция и конвертация в Mach-O на Linux
  build-macho-on-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Скачиваем FASMARM
      - name: Install FASMARM
        run: |
          curl -L https://flatassembler.net -o fasmarm.zip
          unzip fasmarm.zip -d fasmarm_dir
          chmod +x fasmarm_dir/fasmarm.x64

      # Компилируем asm в объектный файл (ELF64)
      - name: Assemble with FASMARM
        run: ./fasmarm_dir/fasmarm.x64 main.asm main.o

      # Конвертируем в Mach-O с помощью LLVM-objcopy (вместо сломанного GNU)
      - name: Convert ELF64 to Mach-O using LLVM
        run: |
          llvm-objcopy --input-target=elf64-littleaarch64 --output-target=mach-o-arm64 main.o main_macho.o

      # Передаем правильный объектный файл дальше
      - name: Upload Mach-O Object File
        uses: actions/upload-artifact@v4
        with:
          name: macho-object
          path: main_macho.o

  # ЭТАП 2: Линковка и запуск на macOS
  link-and-run-on-mac:
    needs: build-macho-on-linux
    runs-on: macos-14 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Mach-O Object File
        uses: actions/download-artifact@v4
        with:
          name: macho-object

      # Линкуем чистый, подготовленный Mach-O
      - name: Link Mach-O to Executable
        run: |
          clang -target arm64-apple-macos \
          -Wl,-syslibroot,$(xcrun --show-sdk-path) \
          -Wl,-e,_main \
          main_macho.o -o program

      # Проверяем работу на реальном Apple Silicon
      - name: Run program
        run: ./program
