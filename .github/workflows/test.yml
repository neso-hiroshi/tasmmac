name: Test Precompiled Binary

on: [push, pull_request]

jobs:
  test-binary:
    runs-on: macos-latest

    steps:
      # 1. Скачиваем готовый .exe из репозитория
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Link object file
        run: chmod +x print
      - name: Run with ktrace
        run: lldb -o run -o quit -- ./print

      - name: Link object file
        run: chmod +x exit
      - name: Run with ktrace
        run: lldb -o run -o quit -- ./exit

