name: Run macOS FASMARM ARM64

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # ЭТАП 1: Разделяем код и данные на Linux без нарушения структуры вашего main.o
  extract-sections:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM
        run: sudo apt-get update && sudo apt-get install -y llvm

      # Вытаскиваем отдельно чистый код и отдельно чистую строку данных
      - name: Extract sections
        run: |
          llvm-objcopy -O binary --only-section=.text main.o text.bin
          llvm-objcopy -O binary --only-section=.data main.o data.bin

      # Передаем оба файла на Mac
      - name: Upload Binary Sections
        uses: actions/upload-artifact@v4
        with:
          name: raw-sections
          path: |
            text.bin
            data.bin

  # ЭТАП 2: Собираем правильный Mach-O на Mac с раздельными секциями
  link-and-run:
    needs: extract-sections
    runs-on: macos-14 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Binary Sections
        uses: actions/download-artifact@v4
        with:
          name: raw-sections

      # Создаем маковский ассемблерный файл, который раскладывает всё по полочкам
      - name: Wrap code and data into Mach-O
        run: |
          echo ".global _main" > wrapper.s
          
          # Кладем код в секцию исполнения __TEXT
          echo ".text" >> wrapper.s
          echo ".align 2" >> wrapper.s
          echo "_main:" >> wrapper.s
          echo ".incbin \"text.bin\"" >> wrapper.s
          
          # Кладем строку в секцию данных __DATA
          echo ".data" >> wrapper.s
          echo ".align 2" >> wrapper.s
          echo "msg:" >> wrapper.s
          echo ".incbin \"data.bin\"" >> wrapper.s
          
          as -o main_macho.o wrapper.s

      # Линкуем чистокровный маковский файл
      - name: Link to Executable
        run: |
          clang -target arm64-apple-macos \
          -Wl,-syslibroot,$(xcrun --show-sdk-path) \
          -Wl,-e,_main \
          main_macho.o -o program

      # Запускаем нативную программу
      - name: Run program
        run: ./program
