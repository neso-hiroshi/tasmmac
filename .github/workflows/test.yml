name: Run macOS FASMARM ARM64 (via Apt Objconv)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # ЭТАП 1: Устанавливаем objconv из репозитория и конвертируем файл на Linux
  convert-via-objconv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Устанавливаем официальный пакет objconv из репозитория Ubuntu
      - name: Install objconv via apt
        run: |
          sudo apt-get update
          sudo apt-get install -y objconv

      # Конвертируем ваш готовый main.o из формата ELF64 в Mach-O ARM64 (-fmacho64ar)
      - name: Convert ELF64 to Mach-O
        run: |
          objconv -fmacho64ar main.o main_macho.o

      # Передаем готовый объектный файл дальше на Mac
      - name: Upload Mach-O Object File
        uses: actions/upload-artifact@v4
        with:
          name: macho-object
          path: main_macho.o

  # ЭТАП 2: Линкуем готовый Mach-O на Mac и запускаем программу
  link-and-run:
    needs: convert-via-objconv
    runs-on: macos-14 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Mach-O Object File
        uses: actions/download-artifact@v4
        with:
          name: macho-object

      # Линкуем чистокровный маковский объектник, созданный через официальный objconv
      - name: Link to Executable
        run: |
          clang -target arm64-apple-macos \
          -Wl,-syslibroot,$(xcrun --show-sdk-path) \
          -Wl,-e,_main \
          main_macho.o -o program

      # Финальный запуск
      - name: Run program
        run: ./program

