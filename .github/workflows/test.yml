name: Run macOS FASMARM ARM64

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # ЭТАП 1: Конвертируем ваш готовый main.o на Linux
  convert-on-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Устанавливаем GNU Binutils, где есть мощный objcopy
      - name: Install Binutils
        run: sudo apt-get update && sudo apt-get install -y binutils-aarch64-linux-gnu

      # Перезаписываем заголовок из ELF64 в Mach-O ARM64
      - name: Convert ELF64 to Mach-O
        run: |
          aarch64-linux-gnu-objcopy -I elf64-littleaarch64 -O mach-o-arm64 main.o main_macho.o

      # Сохраняем правильный маковский объектник в облако GitHub
      - name: Upload Mach-O Object File
        uses: actions/upload-artifact@v4
        with:
          name: macho-object
          path: main_macho.o

  # ЭТАП 2: Линкуем и запускаем на реальном Mac
  link-and-run-on-mac:
    needs: convert-on-linux # Ждем, пока Linux сделает свою работу
    runs-on: macos-14 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Скачиваем готовый маковский файл из облака GitHub
      - name: Download Mach-O Object File
        uses: actions/download-artifact@v4
        with:
          name: macho-object

      # Линкуем чистый Mach-O без ошибок типов файлов
      - name: Link Mach-O to Executable
        run: |
          clang -target arm64-apple-macos \
          -Wl,-syslibroot,$(xcrun --show-sdk-path) \
          -Wl,-e,_main \
          main_macho.o -o program

      # Запускаем готовую программу
      - name: Run program
        run: ./program
