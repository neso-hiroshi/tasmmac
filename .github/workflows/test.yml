name: Test Precompiled Binary

on: [push, pull_request]

jobs:
  test-binary:
    runs-on: macos-latest

    steps:
      # 1. Скачиваем готовый .exe из репозитория
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Link object file
        run: chmod +x print
      - name: Run with ktrace
        run: lldb -o run -o quit -- ./print

      - name: Link object file
        run: chmod +x println
      - name: Run with ktrace
        run: lldb -o run -o quit -- ./println
        
      - name: Link object file
        run: chmod +x print_loop
      - name: Run with ktrace
        run: lldb -o run -o quit -- ./print_loop
