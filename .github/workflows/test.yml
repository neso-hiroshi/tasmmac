name: Run macOS FASMARM ARM64 (Precompiled)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  link-and-run:
    runs-on: macos-14 

    steps:
      # 1. Просто скачиваем ваш репозиторий (вместе с готовым main.o)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Пересобираем объектник ELF64 в нативный Mach-O ARM64 через Clang
      - name: Cross-Link to Mach-O ARM64
        run: |
          clang -target arm64-apple-macos \
          -Wl,-syslibroot,$(xcrun --show-sdk-path) \
          -Wl,-e,_main \
          main.o -o program

      # 3. Запускаем нативную ARM64 программу на сервере Apple Silicon
      - name: Run program
        run: ./program
