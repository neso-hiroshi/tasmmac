name: Run macOS FASMARM ARM64

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # ЭТАП 1: Вытаскиваем чистый машинный код И данные на Linux
  extract-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM
        run: sudo apt-get update && sudo apt-get install -y llvm

      # Вытаскиваем ВЕСЬ бинарный дамп (и код, и данные строки) в один файл
      - name: Extract full binary dump
        run: |
          llvm-objcopy -O binary main.o full_code.bin

      - name: Upload Binary Code
        uses: actions/upload-artifact@v4
        with:
          name: raw-code
          path: full_code.bin

  # ЭТАП 2: Упаковываем всё в Mach-O на Mac и запускаем
  link-and-run:
    needs: extract-code
    runs-on: macos-14 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Binary Code
        uses: actions/download-artifact@v4
        with:
          name: raw-code

      # Обертка, которая включает в себя и код, и строку данных из FASMARM
      - name: Wrap code into Mach-O
        run: |
          echo ".global _main" > wrapper.s
          echo ".align 2" >> wrapper.s
          echo "_main:" >> wrapper.s
          echo ".incbin \"full_code.bin\"" >> wrapper.s
          as -o main_macho.o wrapper.s

      - name: Link to Executable
        run: |
          clang -target arm64-apple-macos \
          -Wl,-syslibroot,$(xcrun --show-sdk-path) \
          -Wl,-e,_main \
          main_macho.o -o program

      - name: Run program
        run: ./program

