name: Test fasmarm hello world

on:
  push:
  workflow_dispatch:

jobs:
  test-macos13:
    runs-on: macos-13-xlarge
    steps:
      - uses: actions/checkout@v4
      - name: info
        run: sw_vers && uname -m
      - name: run
        run: |
          chmod +x mc.bin
          codesign -s - mc.bin
          ./mc.bin

  test-macos14:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: info
        run: sw_vers && uname -m
      - name: run
        run: |
          chmod +x mc.bin
          codesign -s - mc.bin
          ./mc.bin
