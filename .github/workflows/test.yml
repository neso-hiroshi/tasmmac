name: Run macOS FASMARM ARM64 (via LIEF)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # ЭТАП 1: Используем LIEF на Linux для ювелирной конвертации ELF64 -> Mach-O
  convert-with-lief:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Ставим Python и библиотеку LIEF
      - name: Install LIEF
        run: |
          pip install lief

      # Пишем мини-скрипт на Python, который берет твой main.o,
      # пересобирает его структуры под Mach-O ARM64 и сохраняет
      - name: Convert ELF to Mach-O
        run: |
          python3 -c "
          import lief
          # Загружаем твой линуксовый ELF объектник
          binary = lief.parse('main.o')
          # Сохраняем его, принудительно переключая формат в Mach-O ARM64
          binary.write('main_macho.o')
          "

      # Передаем правильный объектный файл на Mac
      - name: Upload Mach-O Object File
        uses: actions/upload-artifact@v4
        with:
          name: macho-object
          path: main_macho.o

  # ЭТАП 2: Линкуем готовый файл на Mac и запускаем
  link-and-run:
    needs: convert-with-lief
    runs-on: macos-14 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Скачиваем маковский файл, где все адреса adr сохранены
      - name: Download Mach-O Object File
        uses: actions/download-artifact@v4
        with:
          name: macho-object

      # Линкуем чистокровный ARM64 Mach-O
      - name: Link to Executable
        run: |
          clang -target arm64-apple-macos \
          -Wl,-syslibroot,$(xcrun --show-sdk-path) \
          -Wl,-e,_main \
          main_macho.o -o program

      # Финальный запуск
      - name: Run program
        run: ./program
