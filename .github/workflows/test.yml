name: Run macOS FASMARM ARM64 (via Objconv)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # ЭТАП 1: Конвертируем файл на Linux через objconv
  convert-via-objconv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Скачиваем и компилируем утилиту objconv
      - name: Build objconv tool
        run: |
          sudo apt-get update && sudo apt-get install -y g++ unzip
          curl -L https://github.com -o objconv.zip
          unzip objconv.zip
          cd objconv-master
          # Компилируем исходники objconv
          g++ -o objconv -O2 src/*.cpp
          cp objconv ../
          cd ..

      # Нативная конвертация: из ELF64 (-felf64) в Mach-O ARM64 (-fmacho64)
      # Внимание: objconv идеально перенесет все относительные адреса (adr)
      - name: Convert ELF64 to Mach-O
        run: |
          ./objconv -fmacho64 main.o main_macho.o

      - name: Upload Mach-O Object File
        uses: actions/upload-artifact@v4
        with:
          name: macho-object
          path: main_macho.o

  # ЭТАП 2: Линкуем готовый Mach-O на Mac
  link-and-run:
    needs: convert-via-objconv
    runs-on: macos-14 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Mach-O Object File
        uses: actions/download-artifact@v4
        with:
          name: macho-object

      # Линкуем чистокровный маковский объектник, созданный через objconv
      - name: Link to Executable
        run: |
          clang -target arm64-apple-macos \
          -Wl,-syslibroot,$(xcrun --show-sdk-path) \
          -Wl,-e,_main \
          main_macho.o -o program

      - name: Run program
        run: ./program
