name: Run macOS FASMARM ARM64

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  link-and-run:
    runs-on: macos-14 
    steps:
      # 1. Скачиваем ваш репозиторий с готовым файлом main.o
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Линкуем ELF64 файл напрямую через Clang, заставляя его проигнорировать тип заголовка
      - name: Link ELF64 to Mach-O
        run: |
          clang -target arm64-apple-macos \
          -Wl,-syslibroot,$(xcrun --show-sdk-path) \
          -Wl,-e,_main \
          -Wl,-pagezero_size,10000 \
          main.o -o program

      # 3. Проверяем работу на реальном Apple Silicon
      - name: Run program
        run: ./program
