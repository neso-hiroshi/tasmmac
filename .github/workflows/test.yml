name: Run macOS FASMARM ARM64

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # ЭТАП 1: Скачиваем зеркало, собираем objconv из исходников на Linux и конвертируем main.o
  convert-via-objconv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Сборка objconv из стабильного исходного кода
      - name: Build Objconv from Source Mirror
        run: |
          sudo apt-get update && sudo apt-get install -y g++ git unzip
      
          git clone https://github.com/staticfloat/objconv.git objconv_repo
          
          cd objconv_repo
          unzip source.zip
          g++ -o objconv -O2 src/*.cpp
          cp objconv ../objconv
          cd ..
          chmod +x objconv

      # Конвертируем твой готовый main.o из формата ELF64 в Mach-O ARM64
      - name: Convert ELF64 to Mach-O
        run: |
          ./objconv -fmacho64ar main.o main_macho.o

      # Передаем получившийся файл на этап линковки
      - name: Upload Mach-O Object File
        uses: actions/upload-artifact@v4
        with:
          name: macho-object
          path: main_macho.o

  # ЭТАП 2: Забираем готовый Mach-O файл на Mac, линкуем и запускаем
  link-and-run:
    needs: convert-via-objconv
    runs-on: macos-14 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Mach-O Object File
        uses: actions/download-artifact@v4
        with:
          name: macho-object

      # Линкуем чистокровный маковский объектник, в котором objconv сохранил все адреса строки
      - name: Link to Executable
        run: |
          clang -target arm64-apple-macos \
          -Wl,-syslibroot,$(xcrun --show-sdk-path) \
          -Wl,-e,_main \
          main_macho.o -o program

      # Долгожданный запуск нативной программы
      - name: Run program
        run: ./program
