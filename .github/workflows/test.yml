name: Run macOS FASMARM ARM64

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  extract-sections:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM
        run: sudo apt-get update && sudo apt-get install -y llvm

      # Вырезаем секции чисто, как они есть
      - name: Extract sections
        run: |
          llvm-objcopy -O binary --only-section=.text main.o text.bin
          llvm-objcopy -O binary --only-section=.data main.o data.bin

      - name: Upload Binary Sections
        uses: actions/upload-artifact@v4
        with:
          name: raw-sections
          path: |
            text.bin
            data.bin

  link-and-run:
    needs: extract-sections
    runs-on: macos-14 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Binary Sections
        uses: actions/download-artifact@v4
        with:
          name: raw-sections

      # ХИТРЫЙ ТРЮК: Мы склеиваем их в ОДНУ маковскую секцию .text.
      # На маке секция .text по умолчанию доступна и для чтения (нашего текста).
      # Это восстановит оригинальное взаимное расположение кода и данных!
      - name: Wrap code and data into single section
        run: |
          echo ".global _main" > wrapper.s
          echo ".text" >> wrapper.s
          echo ".align 2" >> wrapper.s
          echo "_main:" >> wrapper.s
          echo ".incbin \"text.bin\"" >> wrapper.s
          
          # Мы НЕ пишем ".data". Мы пишем метку прямо внутри кода, 
          # чтобы данные приклеились вплотную к концу кода, как в ELF
          echo "msg:" >> wrapper.s
          echo ".incbin \"data.bin\"" >> wrapper.s
          
          as -o main_macho.o wrapper.s

      - name: Link to Executable
        run: |
          clang -target arm64-apple-macos \
          -Wl,-syslibroot,$(xcrun --show-sdk-path) \
          -Wl,-e,_main \
          main_macho.o -o program

      - name: Run program
        run: ./program
